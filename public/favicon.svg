<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <style>
      .bg { fill: #FAF8F5; }
      .border { fill: none; stroke: #292524; stroke-width: 4; stroke-opacity: 0.15; }
      .accent { fill: #B45309; }
      .letter {
        font-family: 'Playfair Display', 'Didot', 'Cinzel', 'Georgia', serif;
        font-size: 300px;
        font-weight: 300;
        fill: #1C1917;
        text-anchor: middle;
        dominant-baseline: central;
      }
      .sub {
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 24px;
        font-weight: 600;
        letter-spacing: 0.4em;
        fill: #78716C;
        text-anchor: middle;
      }
    </style>
  </defs>
  <!-- Background with high-fashion rounded corner feel -->
  <rect width="512" height="512" rx="160" class="bg" />
  <!-- Mathematically nested border: Outer rx (160) - padding (20) = Inner rx (140) -->
  <rect x="20" y="20" width="472" height="472" rx="140" class="border" />
  
  <!-- Architectural vertical line details to symbolize curation/alignment -->
  <line x1="256" y1="20" x2="256" y2="70" stroke="#B45309" stroke-width="4" />
  <line x1="256" y1="442" x2="256" y2="492" stroke="#B45309" stroke-width="4" />
  
  <!-- Centered elegant serif letter 'A' -->
  <text x="256" y="246" class="letter">A</text>
  
  <!-- Editorial subtitling -->
  <text x="272" y="390" class="sub">STUDIO</text>
  
  <!-- Aesthetic accent point -->
  <circle cx="362" cy="382" r="10" class="accent" />
</svg>
